<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Weather App</title>
  </head>

  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input
            type="search"
            id="search-input"
            placeholder="Enter a city.."
            required
          />
          <input type="submit" value="Search" />
        </form>
      </header>

      <main>
        <h1 id="current-city">Paris</h1>

        <p>
          <span id="current-date"></span><br />
        </p>

        <p>
          Temperature:
          <strong><span id="temperature">24</span>°C</strong>
        </p>
      </main>

      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/Kingarthur404" target="_blank">
            Maria Costa Santos
          </a>
          and is
          <a
            href="https://github.com/Kingarthur404/weather-app"
            target="_blank"
          >
            open-sourced on GitHub
          </a>
          and
          <a href="https://YOUR-NETLIFY-LINK.netlify.app" target="_blank">
            hosted on Netlify
          </a>
        </p>
      </footer>
    </div>

    <!-- AXIOS -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- TEU JS -->
    <script src="script.js"></script>
  </body>
</html>
