<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Vanilla Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input type="search" id="search-input" placeholder="Enter a city.." required class="search-input" />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>

      <main>
        <div class="current-weather">
          <div>
            <h1 id="current-city">Paris</h1>
            <p class="current-details">
              <span id="current-date"></span>,
              <span id="weather-description">clear sky</span><br />
              Humidity: <strong id="humidity">--%</strong>, Wind:
              <strong id="wind-speed">--km/h</strong>
            </p>
          </div>

          <div class="current-temperature">
            <img id="weather-icon" class="current-temperature-icon" src="" alt="" />
            <span id="temperature">--</span>
            <span class="current-temperature-unit">°C</span>
          </div>
        </div>
<div class="weather-forecast" id="forecast"></div>
</main>
      </main>

      <footer>
        This project was coded by
        <a href="https://github.com/Kingarthur404" target="_blank">Maria Costa Santos</a>
        and is
        <a href="https://github.com/Kingarthur404/weather-app" target="_blank">open-sourced on GitHub</a>
        and
        <a href="https://weather-appmcs.netlify.app/" target="_blank">hosted on Netlify</a>.
      </footer>
    </div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="src/index.js"></script>
  </body>
</html>
